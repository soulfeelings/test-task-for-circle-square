services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: guss_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - full

  # Backend API
  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/guss_game?schema=public
      - PORT=3000
      - ROUND_DURATION=60
      - COOLDOWN_DURATION=30
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/prisma
    command: sh -c "yarn prisma db push && yarn dev"
    profiles:
      - dev
      - full

  # Frontend Development
  frontend-dev:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:3000
      - VITE_USE_MOCKS=false
    depends_on:
      - backend
    profiles:
      - dev

  # Frontend Production
  frontend-prod:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    profiles:
      - prod

volumes:
  postgres_data:
